name: zombie-run
version: '${version}'
main: cn.oneachina.zombieRun.ZombieRun
api-version: '1.21'
folia-supported: true
prefix: ZombieRun
load: STARTUP
authors: [ oneachina ]

commands:
  zr:
    description: 僵尸跑快插件命令
    usage: /zr <help>
  start:
    description: 开始游戏
    usage: /start
    permission: zombie.run.start
    permission-message: §c你没有权限使用此命令！
  open:
    description: 打开门
    usage: /open <doorNumber>
    permission: zombie.run.admin
    permission-message: §c你没有权限使用此命令！
  close:
    description: 关闭门
    usage: /close <doorNumber>
    permission: zombie.run.admin
    permission-message: §c你没有权限使用此命令！
  door:
    description: 门操作命令（控制台命令）
    usage: /door <n>
    permission: zombie.run.admin
    permission-message: §c你没有权限使用此命令！
  doorperf:
    description: 过门检测性能测试命令
    usage: /doorperf
    permission: zombie.run.admin
    permission-message: §c你没有权限使用此命令！

permissions:
  zombie.run.admin:
    description: 允许使用僵尸快跑插件管理命令
    default: op
  zombie.run.start:
    description: 允许使用开始游戏命令
    default: op
