# ---------- 杂项 ----------
misc:
  explosion-damage-reduction: 0.5   # 爆炸伤害减免倍率（0.5 = 减半）
  knockback-reduction: 0.3          # 击退效果减免
  zombie-knockback-force: 0.8       # 僵尸被人类击退时的力度
