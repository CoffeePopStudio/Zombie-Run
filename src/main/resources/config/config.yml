game:
  mode: zombie_run
  world: world
  start-delay: 30
  min-players: 8
  max-players: 32
  max-duration: 1800

spawn:
  x: 0
  y: 64
  z: 0
  yaw: 0.0
  pitch: 0.0

end:
  x: 100
  y: 64
  z: 100

zombie:
  health-multiplier: 2.0
  speed-multiplier: 1.2
  damage-multiplier: 1.5

human:
  speed-multiplier: 1.0
  jump-multiplier: 1.0
  stamina-regen: 0.1

stamina:
  max: 100.0
  sprint-cost: 0.5
  standing-regen: 0.2

weapons:
  default-price: 600
  prices: {}

misc:
  explosion-damage-reduction: 0.5
  knockback-reduction: 0.3
  zombie-knockback-force: 0.8
